<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Rappi Consumer</title>
<link rel="stylesheet" href="styles.css">

<!-- Leaflet (mapas) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Supabase Realtime -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<header class="header">

<div class="logo">
Rappi 🛵
<span id="cart-count">0</span>
</div>

<div class="search">
<input type="text" placeholder="Buscar productos o tiendas">
</div>

</header>

<div class="layout">

<main class="main">

<!-- Tiendas -->
<section>
<h2>Tiendas</h2>
<div id="stores" class="store-grid"></div>
</section>

<!-- Productos -->
<section>
<h2>Productos</h2>
<div id="products" class="product-grid"></div>
</section>

<!-- MAPA (solo al crear orden) -->
<section id="map-container" style="display:none;">
<h2>Selecciona tu ubicación</h2>

<div id="map" style="height: 300px; border-radius: 10px;"></div>

<p id="coords"></p>

<button onclick="confirmOrder()">Confirmar ubicación</button>
</section>

<!-- MIS PEDIDOS -->
<section>
<h2>Mis pedidos</h2>
<button onclick="loadMyOrders()">Ver pedidos</button>
<div id="orders"></div>
</section>

</main>

<!-- Carrito -->
<aside class="cart-panel">

<h2>🛒 Carrito</h2>

<ul id="cart"></ul>

<p id="total">Total: $0</p>

<button class="order-btn" onclick="openMap()">Crear Orden</button>

</aside>

</div>

<!-- JS principal -->
<script defer src="app.js"></script>

</body>
</html>
